# ==========================================================================
#  Konfiguration. Geheime Werte (DB-Passwort, JWT-Schlüssel) kommen aus
#  Umgebungsvariablen — sie stehen NICHT im Code/Repository.
#  Format ${VARIABLE:standardwert}.
# ==========================================================================

# Port: Hoster (Render) geben ihn über $PORT vor; lokal 8080.
server.port=${PORT:8080}

# --- Datenbank (Supabase PostgreSQL) ---
# Beispiel-URL (Session-Pooler, IPv4-fähig, SSL):
#   jdbc:postgresql://aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate (ORM) ---
# ddl-auto=update: Hibernate legt die Tabelle mt_user_data beim Start automatisch an.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# SQL-Logging: in Produktion aus. Zum Debuggen per SPRING_JPA_SHOW_SQL=true einschaltbar.
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# --- Supabase Auth ---
# Login/Registrierung/E-Mail-Bestätigung/Google/GitHub macht Supabase. Das Backend
# prüft nur die von Supabase ausgestellten Tokens mit diesem Secret
# (Supabase → Settings → API → "JWT Secret").
supabase.jwt-secret=${SUPABASE_JWT_SECRET}

# --- CORS: welche Frontends dürfen das Backend aufrufen? ---
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,https://alibrb666.github.io}
