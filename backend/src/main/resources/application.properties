# ==========================================================================
#  Konfiguration. Geheime Werte (DB-Passwort, JWT-Schlüssel) kommen aus
#  Umgebungsvariablen — sie stehen NICHT im Code/Repository.
#  Format ${VARIABLE:standardwert}.
# ==========================================================================

# Port: Hoster (Render) geben ihn über $PORT vor; lokal 8080.
server.port=${PORT:8080}

# --- Datenbank (Supabase PostgreSQL) ---
# Beispiel-URL (Session-Pooler, IPv4-fähig, SSL):
#   jdbc:postgresql://aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate (ORM) ---
# ddl-auto=update: Hibernate legt die Tabellen mt_users/mt_app_data beim Start
# automatisch an, falls sie fehlen. Praktisch zum Lernen.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# SQL-Logging: in Produktion aus (Log-Rauschen/Performance). Zum Debuggen per
# Umgebungsvariable SPRING_JPA_SHOW_SQL=true einschaltbar.
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# --- JWT ---
# APP_JWT_SECRET muss mind. 32 Zeichen lang & geheim sein.
app.jwt.secret=${APP_JWT_SECRET}
# Token-Gültigkeit: 30 Tage (in Millisekunden).
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:2592000000}

# --- CORS: welche Frontends dürfen das Backend aufrufen? ---
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,https://alibrb666.github.io}

# --- URLs ---
# Frontend (GitHub Pages): wohin nach Bestätigung/OAuth zurückgeleitet wird.
app.frontend-url=${FRONTEND_URL:https://alibrb666.github.io/macro-tracker/}
# Öffentliche Backend-URL (für den Bestätigungslink in der Mail). Lokal: localhost.
app.backend-url=${BACKEND_URL:http://localhost:8080}

# --- E-Mail-Versand (Resend SMTP; per Env auf jeden anderen SMTP-Anbieter umstellbar) ---
spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:resend}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Absender — muss bei Resend eine verifizierte Domain sein (Testbetrieb: onboarding@resend.dev).
app.mail.from=${MAIL_FROM:Macro Tracker <onboarding@resend.dev>}

# Gültigkeit des Bestätigungslinks in Stunden.
app.verification.expiry-hours=${VERIFICATION_EXPIRY_HOURS:24}

# --- Reverse-Proxy (Railway): X-Forwarded-* auswerten, damit die OAuth2-Redirect-URI
#     auf die öffentliche https-URL zeigt (sonst Mismatch mit der beim Anbieter registrierten URI). ---
server.forward-headers-strategy=framework

# --- OAuth2 (Social-Login) ---
# Client-ID/Secret werden in OAuth2ClientConfig aus diesen Env-Vars gelesen; ohne sie
# bleibt Social-Login einfach deaktiviert (die App startet trotzdem):
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
# Registrierte Redirect-URIs beim Anbieter:
#   <BACKEND_URL>/login/oauth2/code/google   und   <BACKEND_URL>/login/oauth2/code/github
